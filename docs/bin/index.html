<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firmware Releases</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 20px; }
h1 { margin-bottom: 24px; font-size: 24px; }
.board { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.12); margin-bottom: 16px; overflow: hidden; }
.board-header { background: #e8e8e8; padding: 12px 16px; font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; }
.board-header .icon { font-size: 18px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 16px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
th { background: #fafafa; font-weight: 600; color: #555; }
tr:last-child td { border-bottom: none; }
.version { font-family: 'SF Mono', 'Consolas', monospace; font-weight: 600; color: #1a73e8; }
.actions { display: flex; gap: 8px; }
.btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 4px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 13px; color: #333; text-decoration: none; transition: background .15s; }
.btn:hover { background: #f0f0f0; }
.btn-primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
.btn-primary:hover { background: #1557b0; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #323232; color: #fff; padding: 12px 24px; border-radius: 6px; font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
@media (max-width: 600px) { th, td { padding: 8px 10px; font-size: 13px; } .btn { padding: 5px 8px; font-size: 12px; } }
</style>
</head>
<body>

<h1>Firmware Releases</h1>
<div id="root"></div>
<div id="toast" class="toast"></div>

<script>
async function load() {
  const res = await fetch('firmwares.json');
  const data = await res.json();
  const groups = {};
  data.firmwares.forEach(fw => {
    if (!groups[fw.board]) groups[fw.board] = [];
    groups[fw.board].push(fw);
  });
  const root = document.getElementById('root');
  const base = location.pathname.replace(/\/[^/]*$/, '/');
  Object.entries(groups).forEach(([board, list]) => {
    const boardDiv = document.createElement('div');
    boardDiv.className = 'board';
    boardDiv.innerHTML = `
      <div class="board-header"><span class="icon">&#x1f527;</span> ${board}</div>
      <table><thead><tr><th>Versione</th><th>Azioni</th></tr></thead><tbody>
        ${list.sort((a,b)=>b.version.localeCompare(a.version,void 0,{numeric:true})).map(fw => `
          <tr>
            <td class="version">v${fw.version}</td>
            <td class="actions">
              <a class="btn btn-primary" href="${fw.url}" target="_blank">&#x2b06; Scarica</a>
              <button class="btn" onclick="copyUrl('${base}${fw.url}')">&#x1f4cb; Copia URL</button>
            </td>
          </tr>
        `).join('')}
      </tbody></table>
    `;
    root.appendChild(boardDiv);
  });
}

function copyUrl(url) {
  navigator.clipboard.writeText(url).then(() => {
    const toast = document.getElementById('toast');
    toast.textContent = 'URL copiato!';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}

load();
</script>
</body>
</html>
